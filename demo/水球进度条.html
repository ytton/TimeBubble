<style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
}

.loader-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #1a1e2d;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.wave-loader {
  position: relative;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.1);
  overflow: hidden;
  box-shadow: 0 0 0 10px rgba(255, 255, 255, 0.05),
    0 0 20px rgba(108, 92, 231, 0.3);
}

.wave {
  position: absolute;
  width: 200%;
  height: 200%;
  top: 50%;
  left: -50%;
  transform-origin: 50% 50%;
  animation: wave 6s linear infinite;
}

.wave1 {
  background: rgba(108, 92, 231, 1);
  border-radius: 45%;
  animation-duration: 6s;
  top: 29%;
}

.wave2 {
  background: rgba(0, 206, 255, 1);
  border-radius: 40%;
  animation-duration: 8s;
  top: 40%;
}
.wave3 {
  background: rgba(255, 106, 0, 1);
  border-radius: 40%;
  animation-duration: 8s;
  top: 41%;
}
.wave4 {
  background: rgb(220, 234, 237);
  border-radius: 40%;
  animation-duration: 8s;
  top: 91%;
}
.percentage {
  position: absolute;
  text-align: center;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-family: sans-serif;
  font-size: 2rem;
  font-weight: bold;
  z-index: 10;
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
}

@keyframes wave {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
} 

</style>
<div class="loader-container">
  <div class="wave-loader">
    <div class="wave wave1"></div>
    <div class="wave wave2"></div>
    <div class="wave wave3"></div>
    <div class="wave wave4"></div>
    <div class="percentage">
      <div>学习</div>
      <div>3h15min</div>
    </div>
  </div>
</div>
